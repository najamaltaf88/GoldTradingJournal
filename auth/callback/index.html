<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signing in...</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/env-config.js"></script>
  <style>
    body { background: #080a0d; color: #c9a84c; font-family: sans-serif;
           display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
  </style>
</head>
<body>
  <p>Signing you in...</p>
  <script>
    (async () => {
      const status = document.querySelector("p");
      const config = window.SUPABASE_CONFIG;
      if (!config || !config.url || !config.anonKey) {
        status.textContent = "Config error. Set SUPABASE_URL and SUPABASE_ANON_KEY.";
        return;
      }
      const params = new URLSearchParams(window.location.search);
      const code = params.get("code");
      const authError = params.get("error_description") || params.get("error");
      if (authError) {
        status.textContent = "Sign-in failed: " + decodeURIComponent(authError.replace(/\+/g, " "));
        return;
      }
      if (!code) {
        status.textContent = "Sign-in failed: missing authorization code.";
        return;
      }
      const client = window.supabase.createClient(config.url, config.anonKey, {
        auth: {
          detectSessionInUrl: true,
          persistSession: true,
          autoRefreshToken: true,
          flowType: "pkce",
          storage: {
            getItem: (key) => sessionStorage.getItem(key),
            setItem: (key, value) => sessionStorage.setItem(key, value),
            removeItem: (key) => sessionStorage.removeItem(key)
          }
        }
      });
      const { error } = await client.auth.exchangeCodeForSession(code);
      if (error) {
        status.textContent = "Sign-in failed: " + error.message;
      } else {
        window.location.replace("/");
      }
    })();
  </script>
</body>
</html>
